services:
  api:
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - caller-data:/workspace/data

  agent:
    build: .
    env_file: .env
    command: python -m agent.worker dev
    depends_on:
      - api

volumes:
  caller-data:
